  <header>
    <h1>日本の伝統：武道と精神文化</h1>
  </header>

  <main>
    <section id="kendo">
      <h2>剣道</h2>
      <p>剣道は、竹刀と防具を用いて行う日本の伝統武道です。</p>
      <p>江戸時代に剣術の稽古法として発展し、明治時代以降に「剣道」として体系化されました。</p>
      <p>「礼に始まり礼に終わる」という精神が重んじられ、技術だけでなく人間形成を目的とします。</p>
      <h3>主な防具</h3>
      <ul>
        <li><strong>面</strong>：頭部・顔面を守る</li>
        <li><strong>胴</strong>：胴体を守る</li>
        <li><strong>小手</strong>：手首・前腕を守る</li>
        <li><strong>垂</strong>：腰・下腹部を守る</li>
      </ul>
    </section>
  </main>
